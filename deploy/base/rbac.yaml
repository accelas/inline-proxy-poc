apiVersion: v1
kind: ServiceAccount
metadata:
  name: inline-proxy-daemon
  namespace: inline-proxy-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: inline-proxy-installer
  namespace: inline-proxy-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: inline-proxy-daemon
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: inline-proxy-daemon
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: inline-proxy-daemon
subjects:
  - kind: ServiceAccount
    name: inline-proxy-daemon
    namespace: inline-proxy-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: inline-proxy-installer
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: inline-proxy-installer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: inline-proxy-installer
subjects:
  - kind: ServiceAccount
    name: inline-proxy-installer
    namespace: inline-proxy-system
