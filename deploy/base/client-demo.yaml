apiVersion: v1
kind: Pod
metadata:
  name: inline-proxy-client-demo
  namespace: default
  labels:
    app: inline-proxy-client-demo
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.8.0
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
        - -c
        - |
          set -eu
          while true; do
            date -Iseconds
            curl -sv --max-time 5 http://inline-proxy-caddy-demo.default.svc.cluster.local/ >/tmp/last-response.txt 2>&1 || true
            sleep 5
          done
