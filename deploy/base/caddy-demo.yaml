apiVersion: apps/v1
kind: Deployment
metadata:
  name: inline-proxy-caddy-demo
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inline-proxy-caddy-demo
  template:
    metadata:
      labels:
        app: inline-proxy-caddy-demo
      annotations:
        inline-proxy.example.com/enabled: "true"
    spec:
      containers:
        - name: caddy
          image: caddy:2.8.4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: inline-proxy-caddy-demo
  namespace: default
spec:
  selector:
    app: inline-proxy-caddy-demo
  ports:
    - name: http
      port: 80
      targetPort: 80
